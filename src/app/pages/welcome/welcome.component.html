<div class="welcome">

  <section class="hero">
    <h1>☁️ PhotoCloud</h1>
    <p>
      Upload, browse and search your images
      <span class="dynamic-word" [style.color]="currentColor" [class.fade]="fading">
        {{ currentWord }}
      </span>
    </p>
  </section>

  <!-- FEATURES -->
  <section class="features">
    <h2>Features</h2>
    <div class="cards">

      <div class="card">
        <div class="icon">📤</div>
        <h3>Upload</h3>
        <p>Add your images quickly and securely.</p>
      </div>

      <div class="card">
        <div class="icon">🖼️</div>
        <h3>Gallery</h3>
        <p>Browse all your photos easily.</p>
      </div>

      <div class="card">
        <div class="icon">🔍</div>
        <h3>Search</h3>
        <p>Find images by tags instantly.</p>
      </div>

    </div>
  </section>

  <!-- ABOUT -->
  <section class="about">
    <p>📚 Project made at EPSI</p>
    <div class="authors">

      <a href="https://github.com/Formidabledu59" target="_blank" class="author">
        <img
          src="https://avatars.githubusercontent.com/u/130578160?v=4"
          alt="Ayoub FATHALLAH"
          class="avatar"
        />
        <span>Ayoub FATHALLAH</span>
      </a>

      <a href="https://github.com/Zagoki" target="_blank" class="author">
        <img
          src="https://avatars.githubusercontent.com/u/156175696?v=4"
          alt="Matthéo COPPIN"
          class="avatar"
        />
        <span>Matthéo COPPIN</span>
      </a>

    </div>
  </section>

</div>
