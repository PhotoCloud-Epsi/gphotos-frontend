name: Deploy Angular Frontend to GCS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy-gcs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Angular app (production, GCS)
        run: npm run build -- --configuration=production --base-href=/ 

      - name: Auth GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: photocloud-epsi
          version: latest

      - name: Deploy to Cloud Storage bucket
        run: |
          gsutil -m rsync -r dist/gphotos-frontend/browser gs://gphotos-frontend
